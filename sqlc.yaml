version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries"
    schema: "internal/db/migrations"
    gen:
      go:
        package: "db"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        rename:
          totp_enabled: TOTPEnabled
          totp_secret: TOTPSecret
          device_ip: DeviceIP
          device_ua: DeviceUA
          doc_url: DocURL
          avatar_url: AvatarURL
          fiat_usd: FiatUSD
          crypto_usd: CryptoUSD
          ip_address: IPAddress
          pending_kyc: PendingKYC
          approved_kyc: ApprovedKYC
          rejected_kyc: RejectedKYC
        overrides:
          - db_type: "date"
            go_type: "string"
          - db_type: "date"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "numeric"
            go_type: "github.com/jackc/pgx/v5/pgtype.Numeric"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "crypto_transactions.amount"
            go_type: "string"
          - column: "caas_withdrawals.amount"
            go_type: "string"
          - column: "crypto_transactions.local_fiat_amount"
            go_type:
              type: "string"
              pointer: true
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
