host: localhost:8080
info:
  contact:
    email: engineering@rach.finance
    name: Rach Finance Engineering
  description: |-
    DigitalFX is a multi-currency fintech platform for Central/West Africa.
    It combines fiat accounts (XAF, XOF, USD, GBP, EUR), HD crypto wallets (BIP-44 via Rach WaaS),
    and stablecoin P2P transfers (USDC/USDT via Rach CaaS ERC-4337 SCWs).
    Mobile Money deposits and withdrawals are handled via HUB2 (MTN, Orange).
  title: DigitalFX API
  version: "1.0"
paths:
  /account/limits:
    get:
      description: Returns the caller's tier limits (individual vs business) and current
        24h withdrawal usage.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AccountLimitsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get account limits and usage
      tags:
      - account
  /accounts:
    get:
      description: Returns all fiat accounts (XAF, XOF, USD, GBP, EUR) for the authenticated
        user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AccountListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List accounts
      tags:
      - accounts
  /accounts/{currency}:
    get:
      description: Returns a single fiat account for the given currency code.
      parameters:
      - description: Currency code
        enum:
        - XAF
        - XOF
        - USD
        - GBP
        - EUR
        in: path
        name: currency
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AccountResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get account by currency
      tags:
      - accounts
  /accounts/{currency}/transactions:
    get:
      description: Returns a paginated list of transactions for the given currency
        account.
      parameters:
      - description: Currency code
        enum:
        - XAF
        - XOF
        - USD
        - GBP
        - EUR
        in: path
        name: currency
        required: true
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Results per page, max 100 (default 20)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TransactionListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List transactions for an account
      tags:
      - accounts
  /accounts/{currency}/transactions/{id}:
    get:
      description: Returns a specific transaction by its UUID.
      parameters:
      - description: Currency code
        enum:
        - XAF
        - XOF
        - USD
        - GBP
        - EUR
        in: path
        name: currency
        required: true
        type: string
      - description: Transaction UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TransactionResponse'
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a single transaction
      tags:
      - accounts
  /activity:
    get:
      description: Unified, filterable transaction feed across all wallet types (fiat,
        crypto, stablecoin). Results are grouped by calendar day (Today / Yesterday
        / Monday / …). Supports a type filter tab and full-text search.
      parameters:
      - description: Filter
        enum:
        - sent
        - received
        - exchanged
        - deposited
        - withdrawn
        in: query
        name: type
        type: string
      - description: Search description, asset, or counterparty
        in: query
        name: search
        type: string
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Results per page (default 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Activity feed
      tags:
      - activity
  /admin/audit-log:
    get:
      description: Returns paginated log of all admin actions (KYC decisions, user
        disables, staff changes, FX rate updates). Filterable by staff member, resource
        type, or specific resource ID.
      parameters:
      - description: Filter by staff member ID
        in: query
        name: staff_id
        type: string
      - description: Filter by resource type (kyc, user, staff, withdrawal_rate)
        in: query
        name: resource
        type: string
      - description: Filter by specific resource ID
        in: query
        name: resource_id
        type: string
      - description: Page
        in: query
        name: page
        type: integer
      - description: Results per page (max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Admin audit trail
      tags:
      - admin-staff
  /admin/dashboard:
    get:
      description: 'Returns aggregate platform stats: total/active/disabled users,
        KYC pipeline counts, transaction volume (30d), new user growth (7d / 30d),
        and active staff count.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Admin dashboard statistics
      tags:
      - admin-users
  /admin/kyc/{id}/approve:
    post:
      description: Marks the user's identity as verified and activates full account
        access. Sends a confirmation email to the user.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Approve user KYC
      tags:
      - admin
  /admin/kyc/{id}/reject:
    post:
      consumes:
      - application/json
      description: Marks the user's identity verification as rejected and notifies
        them with the reason. The user can resubmit.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Rejection reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.AdminKYCRejectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reject user KYC
      tags:
      - admin
  /admin/kyc/{id}/release:
    post:
      description: Clears the admin manual-override flag so the automated provider
        (Sumsub) can once again set the user's KYC status via webhook. Use this to
        undo a manual approve/reject and return to hybrid auto mode.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Release KYC control back to the provider
      tags:
      - admin
  /admin/kyc/pending:
    get:
      description: Returns all users whose identity verification status is "under_review"
        or "submitted" — ready for admin decision.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List users awaiting KYC review
      tags:
      - admin
  /admin/limits:
    get:
      description: Returns the current (admin-editable) limits for every account tier.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List account-tier limits
      tags:
      - admin-limits
  /admin/limits/{tier}:
    patch:
      consumes:
      - application/json
