host: localhost:8080
info:
  contact:
    email: engineering@rach.finance
    name: Rach Finance Engineering
  description: |-
    DigitalFX is a multi-currency fintech platform for Central/West Africa.
    It combines fiat accounts (XAF, XOF, USD, GBP, EUR), HD crypto wallets (BIP-44 via Rach WaaS),
    and stablecoin P2P transfers (USDC/USDT via Rach CaaS ERC-4337 SCWs).
    Mobile Money deposits and withdrawals are handled via HUB2 (MTN, Orange).
  title: DigitalFX API
  version: "1.0"
paths:
  /accounts:
    get:
      description: Returns all fiat accounts (XAF, XOF, USD, GBP, EUR) for the authenticated
        user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AccountListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List accounts
      tags:
      - accounts
  /accounts/{currency}:
    get:
      description: Returns a single fiat account for the given currency code.
      parameters:
      - description: Currency code
        enum:
        - XAF
        - XOF
        - USD
        - GBP
        - EUR
        in: path
        name: currency
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AccountResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get account by currency
      tags:
      - accounts
  /accounts/{currency}/transactions:
    get:
      description: Returns a paginated list of transactions for the given currency
        account.
      parameters:
      - description: Currency code
        enum:
        - XAF
        - XOF
        - USD
        - GBP
        - EUR
        in: path
        name: currency
        required: true
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Results per page, max 100 (default 20)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TransactionListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List transactions for an account
      tags:
      - accounts
  /accounts/{currency}/transactions/{id}:
    get:
      description: Returns a specific transaction by its UUID.
      parameters:
      - description: Currency code
        enum:
        - XAF
        - XOF
        - USD
        - GBP
        - EUR
        in: path
        name: currency
        required: true
        type: string
      - description: Transaction UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TransactionResponse'
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a single transaction
      tags:
      - accounts
  /activity:
    get:
      description: Paginated list of all transactions across fiat (Nilos), crypto
        (Rach Payments WaaS), and stablecoin (Rach CaaS). Each item carries type (credit/debit/exchange),
        asset symbol, formatted amount, status, and counterparty name where available.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20, max 50)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
