      description: Initiates a Mobile Money collection (deposit) via HUB2, crediting
        the user's fiat account when confirmed. Returns the HUB2 reference for webhook
        correlation.
      parameters:
      - description: Deposit details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.DepositRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.Hub2RefResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Initiate Mobile Money deposit
      tags:
      - wallets
  /wallets/fiat/{currency}:
    get:
      description: Returns the wallet header (balance, account number, actions) for
        a specific fiat currency.
      parameters:
      - description: Currency code (USD, EUR, GBP, XAF, XOF)
        in: path
        name: currency
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Fiat wallet detail
      tags:
      - wallets
  /wallets/fiat/{currency}/transactions:
    get:
      description: Returns the transaction history for a fiat wallet with time-period
        grouping (THIS WEEK / LAST WEEK / EARLIER) and aggregate stats (In / Out /
        Total). Filterable by type and full-text search.
      parameters:
      - description: Currency code
        in: path
        name: currency
        required: true
        type: string
      - description: Transaction type
        enum:
        - sent
        - received
        - exchanged
        - deposited
        - withdrawn
        in: query
        name: type
        type: string
      - description: Search description or reference
        in: query
        name: search
        type: string
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Results per page (default 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Fiat wallet transaction history
      tags:
      - wallets
  /wallets/overview:
    get:
      description: Returns the Phone Send card (USDC balance + recent contacts) plus
        the unified wallet list (fiat + stablecoins + crypto). Filter with ?type=fiat|stablecoin|crypto.
      parameters:
      - description: Wallet type filter
        enum:
        - fiat
        - stablecoin
        - crypto
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Wallets overview
      tags:
      - wallets
  /wallets/stablecoin/{symbol}:
    get:
      description: Returns the wallet header for a stablecoin (USDC). Balance is fetched
        live from Rach CaaS.
      parameters:
      - description: Token symbol (USDC)
        in: path
        name: symbol
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stablecoin wallet detail
      tags:
      - wallets
  /wallets/stablecoin/{symbol}/transactions:
    get:
      description: Returns CaaS P2P send/receive history for the USDC stablecoin wallet.
        Maps to the same data as GET /crypto/transactions.
      parameters:
      - description: Token symbol (USDC)
        in: path
        name: symbol
        required: true
        type: string
      - description: Page
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stablecoin transaction history
      tags:
      - wallets
  /wallets/supported-assets:
    get:
      description: Returns all addable assets (crypto networks + stablecoins) with
        has_wallet=true if the user has already provisioned that wallet. Used for
        the + Add flow.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Supported assets
      tags:
      - wallets
  /wallets/swap/execute:
    post:
      consumes:
      - application/json
      description: Broadcasts a swap transaction from the caller's WaaS wallet using
        a previously quoted route.
      parameters:
      - description: Swap details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.ExecuteSwapRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/payments.ExecuteSwapResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Execute a WaaS token swap
      tags:
      - wallets
  /wallets/swap/history:
    get:
      description: Returns the caller's paginated swap transaction history.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Results per page (default 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/payments.GetSwapHistoryResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get WaaS swap history
      tags:
      - wallets
  /wallets/swap/quote:
    get:
      description: Returns a rate quote for swapping tokens across chains using WaaS
        swap.
      parameters:
      - description: Source chain
        in: query
        name: from_chain
        required: true
        type: string
      - description: Destination chain
        in: query
        name: to_chain
        required: true
        type: string
      - description: Source token
        in: query
        name: from_token
        required: true
        type: string
      - description: Destination token
        in: query
        name: to_token
        required: true
        type: string
      - description: Amount in base units
        in: query
        name: amount_in
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/payments.SwapQuoteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a WaaS token swap quote
      tags:
      - wallets
  /wallets/withdraw:
    post:
      consumes:
      - application/json
      description: Initiates a Mobile Money disbursement (withdrawal) via HUB2, debiting
        the user's fiat balance.
      parameters:
      - description: Withdrawal details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.WithdrawalRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.Hub2RefResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Initiate Mobile Money withdrawal
      tags:
      - wallets
  /webhooks/hub2:
    post:
      consumes:
      - application/json
      description: Receives Mobile Money payment status updates from HUB2. On a COLLECTION
        SUCCESSFUL event, DigitalFX automatically credits the user's CaaS USDC wallet.
        The request must carry a valid HMAC-SHA256 signature in the X-Hub2-Signature
        header.
      parameters:
      - description: 'HMAC-SHA256 signature: sha256=<hex>'
        in: header
        name: X-Hub2-Signature
        required: true
        type: string
      - description: HUB2 webhook payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.HUB2WebhookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Invalid signature
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: HUB2 payment webhook
      tags:
      - webhooks
  /webhooks/kyc:
    post:
      consumes:
      - application/json
      description: Receives verification result events from the configured KYC provider
        (Sumsub). The provider's decision is recorded and, unless an admin has taken
        manual control, applied to the user's KYC status (hybrid auto-approval). Signature
        is verified inside the provider.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
      summary: KYC provider webhook (Sumsub)
      tags:
      - webhooks
  /webhooks/metamap:
    post:
      consumes:
      - application/json
      description: Receives verification result events from MetaMap. Updates KYC status
        to approved or rejected.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: MetaMap verification webhook
      tags:
      - webhooks
  /webhooks/payments:
    post:
      consumes:
      - application/json
      description: Handles transaction updates (detected/confirmed deposits) pushed
        by the Payments WaaS microservice.
      parameters:
      - description: 'HMAC-SHA256 signature: hex'
        in: header
        name: X-Webhook-Signature
        required: true
        type: string
      - description: Webhook payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.PaymentsWebhookPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Rach WaaS Webhook
      tags:
      - webhooks
  /withdrawals:
    get:
      description: Returns a paginated list of the caller's fiat withdrawal requests.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Results per page, max 50 (default 20)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.WithdrawalListResponse'
      security:
      - BearerAuth: []
      summary: List fiat withdrawals
      tags:
      - withdrawals
    post:
      consumes:
      - application/json
      description: Initiates a withdrawal from the user's Nilos-backed fiat account
      parameters:
      - description: Withdrawal request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.InitiateWithdrawalRequestBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.FiatWithdrawalResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "422":
          description: Insufficient balance
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Initiate fiat withdrawal
      tags:
      - withdrawals
  /withdrawals/{id}:
    get:
      parameters:
      - description: Withdrawal UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.FiatWithdrawalResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a fiat withdrawal by ID
      tags:
      - withdrawals
  /withdrawals/beneficiaries:
    get:
      description: Returns all saved withdrawal destinations (banks and mobile money
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.BeneficiaryResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List saved beneficiaries
      tags:
      - withdrawals
    post:
      consumes:
      - application/json
      description: Saves a bank account or mobile money number for quick repeat
      parameters:
      - description: Beneficiary
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.SaveBeneficiaryRequestBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.BeneficiaryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Save a new beneficiary
      tags:
      - withdrawals
  /withdrawals/beneficiaries/{id}:
    delete:
      parameters:
      - description: Beneficiary UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a saved beneficiary
      tags:
      - withdrawals
  /withdrawals/quote:
    post:
      consumes:
      - application/json
      description: Returns the exact fee and destination amount for a withdrawal
      parameters:
      - description: Quote request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.WithdrawalQuoteRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.WithdrawalQuoteData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Preview fiat withdrawal
      tags:
      - withdrawals
securityDefinitions:
  BearerAuth:
    description: 'JWT access token — prefix with "Bearer ": Bearer eyJhbGci...'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
