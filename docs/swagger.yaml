        - USD
        - EUR
        - GBP
        - XAF
        - XOF
        example: USD
        type: string
      side:
        description: 'Side: SELL = you specify source amount, BUY = you specify target
          amount'
        enum:
        - SELL
        - BUY
        example: SELL
        type: string
      to:
        enum:
        - USD
        - EUR
        - GBP
        - XAF
        - XOF
        example: EUR
