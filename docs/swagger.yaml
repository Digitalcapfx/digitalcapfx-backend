      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Supported assets
      tags:
      - wallets
  /wallets/withdraw:
    post:
      consumes:
      - application/json
      description: Initiates a Mobile Money disbursement (withdrawal) via HUB2, debiting
        the user's fiat account. Returns the HUB2 reference for tracking.
      parameters:
      - description: Withdrawal details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.WithdrawalRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.Hub2RefResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Initiate Mobile Money withdrawal
      tags:
      - wallets
  /webhooks/hub2:
    post:
      consumes:
      - application/json
      description: Receives Mobile Money payment status updates from HUB2. On a COLLECTION
        SUCCESSFUL event, DigitalFX automatically credits the user's CaaS USDC wallet.
        The request must carry a valid HMAC-SHA256 signature in the X-Hub2-Signature
        header.
      parameters:
      - description: 'HMAC-SHA256 signature: sha256=<hex>'
        in: header
        name: X-Hub2-Signature
        required: true
        type: string
      - description: HUB2 webhook payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.HUB2WebhookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Invalid signature
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: HUB2 payment webhook
      tags:
      - webhooks
  /webhooks/metamap:
    post:
      consumes:
      - application/json
      description: Receives verification result events from MetaMap. Updates KYC status
        to approved or rejected.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: MetaMap verification webhook
      tags:
      - webhooks
  /withdrawals:
    get:
      description: Returns a paginated list of the caller's fiat withdrawal requests.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Results per page, max 50 (default 20)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.WithdrawalListResponse'
      security:
      - BearerAuth: []
      summary: List fiat withdrawals
      tags:
      - withdrawals
    post:
      consumes:
      - application/json
      description: Initiates a withdrawal from the user's Nilos-backed fiat account
      parameters:
      - description: Withdrawal request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.InitiateWithdrawalRequestBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.FiatWithdrawalResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "422":
          description: Insufficient balance
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Initiate fiat withdrawal
      tags:
      - withdrawals
  /withdrawals/{id}:
    get:
      parameters:
      - description: Withdrawal UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.FiatWithdrawalResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a fiat withdrawal by ID
      tags:
      - withdrawals
  /withdrawals/beneficiaries:
    get:
      description: Returns all saved withdrawal destinations (banks and mobile money
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.BeneficiaryResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List saved beneficiaries
      tags:
      - withdrawals
    post:
      consumes:
      - application/json
      description: Saves a bank account or mobile money number for quick repeat
      parameters:
      - description: Beneficiary
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.SaveBeneficiaryRequestBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.BeneficiaryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Save a new beneficiary
      tags:
      - withdrawals
  /withdrawals/beneficiaries/{id}:
    delete:
      parameters:
      - description: Beneficiary UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a saved beneficiary
      tags:
      - withdrawals
  /withdrawals/quote:
    post:
      consumes:
      - application/json
      description: Returns the exact fee and destination amount for a withdrawal
      parameters:
      - description: Quote request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.WithdrawalQuoteRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.WithdrawalQuoteData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Preview fiat withdrawal
      tags:
      - withdrawals
securityDefinitions:
  BearerAuth:
    description: 'JWT access token — prefix with "Bearer ": Bearer eyJhbGci...'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
